            "text": "Magical Constructions services all of Sydney, including the North Shore, Eastern Suburbs, Inner West, Northern Beaches, Western Sydney, and the Sutherland Shire. We've completed projects in Mosman, Cremorne, Manly, Balmoral, Newport, Cronulla, Penrith, Pyrmont, Neutral Bay, and surrounding suburbs."

          "@type": "Question",
          "name": "How much does composite decking cost in Sydney?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Composite decking in Sydney typically costs between $200–$400 per square metre installed, depending on the product grade, deck size, subframe requirements, and site complexity. Magical Constructions provides free on-site consultations and itemised written quotes within 24 hours. Call 0427 731 552 to book."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between composite and hardwood decking?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Composite decking is made from a blend of wood fibre and recycled plastics, offering low maintenance, fade resistance, and a consistent finish — ideal for pool surrounds and high-traffic areas. Hardwood decking (spotted gum, blackbutt, ironbark) provides a natural, warm aesthetic and exceptional durability but requires periodic oiling. Both are premium options well-suited to Sydney's climate."
          }
        },
        {
          "@type": "Question",
          "name": "Do you need council approval to build a deck in Sydney?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In New South Wales, most ground-level decks under 1 metre high and attached to a dwelling are considered Complying Development and do not require a Development Application (DA), provided they meet the relevant SEPP codes. Raised decks, large platforms, or decks in heritage zones may require council approval. We advise on permit requirements during your free site visit."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to build a deck in Sydney?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most residential deck builds take between 3–10 working days depending on size and complexity. Large alfresco structures, multi-level decks or full facade builds may take 2–4 weeks. A project timeline is provided with every itemised quote."
          }
        },
        {
          "@type": "Question",
          "name": "Do you install cladding and facade upgrades in Sydney?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Magical Constructions installs aluminium batten cladding, fibre cement cladding, and timber batten facades across Sydney. We handle full facade transformations including render, garage doors, custom pivot entry doors, and privacy screens. View our project gallery for examples from Balmoral, Ryde, Neutral Bay and surrounds."
          }
        }
